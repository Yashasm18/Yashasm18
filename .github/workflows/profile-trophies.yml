name: Generate profile trophies

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out the profile repository
        uses: actions/checkout@v4

      - name: Generate the trophy SVG
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: Yashasm18
          file: profile/trophies.svg
          theme: radical
          max-cols: 7
          no-background: true
          no-frame: true
          margin-width: 8

      - name: Save updated trophies
        run: |
          if git diff --quiet -- profile/trophies.svg; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/trophies.svg
          git commit -m "Update profile trophies"
          git push
