name: Update streak stats

on:
  schedule:
    - cron: "*/30 * * * *"
  push:
    paths:
      - ".github/workflows/streak-stats.yml" # Run any time this file is modified
  workflow_dispatch: # Run manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&background=151515&stroke=151515&ring=1F8C9E&fire=1F8C9E&currStreakNum=1F8C9E&sideNums=1F8C9E&currStreakLabel=9F9F9F&sideLabels=9F9F9F&dates=9F9F9F&hide_border=true&v=6
          path: profile/streak.svg
          token: ${{ secrets.STREAK_STATS_TOKEN }}

      - name: Offset Total Contributions
        run: |
          # The user has 40 commits that occurred prior to their account creation date (Sep 25, 2025).
          # github-readme-streak-stats only queries from the account creation date, missing these 40 commits.
          # We extract the Total Contributions number from the SVG, add 40, and replace it.
          # The number is located directly after the "<!-- Total Contributions big number -->" block.
          
          # Read the SVG
          content=$(cat profile/streak.svg)
          
          # Use python to perform the precise replacement
          python3 -c "
          import re
          import sys
          
          with open('profile/streak.svg', 'r') as f:
              svg = f.read()
              
          # Find the big number for total contributions
          # It's inside a <g> right after <!-- Total Contributions big number -->
          pattern = r'(<!-- Total Contributions big number -->.*?<text[^>]*>\s*)([0-9,]+)(\s*</text>)'
          
          def replacer(match):
              prefix = match.group(1)
              number_str = match.group(2).replace(',', '')
              suffix = match.group(3)
              new_number = int(number_str) + 40
              return f'{prefix}{new_number:,}{suffix}'
              
          new_svg, count = re.subn(pattern, replacer, svg, flags=re.DOTALL)
          
          if count == 0:
              print('Warning: Could not find Total Contributions number in SVG')
              sys.exit(1)
              
          with open('profile/streak.svg', 'w') as f:
              f.write(new_svg)
          "
          
      - name: Commit streak stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg
          git commit -m "Update streak stats" || exit 0
          git push
