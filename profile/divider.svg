<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 4" width="100%" height="4">
  <defs>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1c1e2e"/>
      <stop offset="100%" stop-color="#1c1e2e"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7dd3fc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="4" fill="url(#track)"/>
  <rect x="-400" y="0" width="400" height="4" fill="url(#sweep)">
    <animate attributeName="x" values="-400;1200" dur="5s" repeatCount="indefinite" />
  </rect>
</svg>
